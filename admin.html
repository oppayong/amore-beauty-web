<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A More Beauty 系統控制台</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background-color: #f5f7f9; color: #4a4a4a; padding: 20px; margin: 0; }
    .container { max-width: 900px; margin: 40px auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    h1 { color: #b76e79; text-align: center; font-size: 24px; margin-bottom: 30px; letter-spacing: 2px; }
    .section-title { font-size: 18px; color: #b76e79; border-left: 4px solid #b76e79; padding-left: 10px; margin: 40px 0 20px; font-weight: bold; }
    .form-group { margin-bottom: 25px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; color: #555; }
    input[type="text"], input[type="password"], textarea { width: 100%; padding: 12px; border: 1px solid #e1e5eb; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
    .btn-save { width: 100%; padding: 15px; background: #b76e79; color: white; border: none; border-radius: 50px; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 20px; font-weight: bold; }
    .btn-save:hover { background: #a05d68; transform: translateY(-2px); }
    #statusMsg { text-align: center; margin-top: 15px; font-size: 14px; min-height: 20px; }
    
    /* 報表表格樣式 */
    .report-card { background: #fff5f6; padding: 20px; border-radius: 12px; margin-top: 20px; border: 1px solid #fce4ec; }
    .report-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; background: white; }
    .report-table th { background: #b76e79; color: white; padding: 10px; text-align: center; }
    .report-table td { border: 1px solid #eee; padding: 10px; text-align: center; }
    .year-total { font-size: 20px; color: #b76e79; font-weight: bold; text-align: center; margin-bottom: 15px; }

    #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    .login-box { width: 320px; text-align: center; }
  </style>
</head>
<body>

<div id="login-overlay">
  <div class="login-box">
    <h1 style="font-family: serif;">A More Beauty</h1>
    <p style="color:#999; font-size:12px; letter-spacing:2px; margin-bottom:30px;">ADMIN LOGIN</p>
    <input type="password" id="adminPass" placeholder="請輸入管理密碼" style="text-align:center; margin-bottom:15px;">
    <button class="btn-save" onclick="checkLogin()">進入系統</button>
    <p id="login-msg" style="color:#b76e79; font-size:13px; margin-top:15px;"></p>
  </div>
</div>

<div class="container" id="admin-content" style="display:none;">
  <h1>系統管理後台</h1>

  <div class="section-title">📊 運營報表即時看板 (2026年度)</div>
  <div class="report-card">
    <div class="year-total" id="yearTotalDisplay">讀取中...</div>
    <div style="overflow-x: auto;">
        <table class="report-table" id="reportTable">
            </table>
    </div>
  </div>

  <div class="section-title">📢 官網頂部公告設定</div>
  <div class="form-group">
    <label>公告文字内容</label>
    <input type="text" id="topText" placeholder="例如：✨ 慶祝母親節...">
  </div>
  <div class="form-group">
    <label>按鈕跳轉連結 (LINE 網址)</label>
    <input type="text" id="topLink" placeholder="https://lin.ee/...">
  </div>

  <div class="section-title">💎 VIP 專屬優惠設定</div>
  <div class="form-group">
    <label>VIP 限時活動標題</label>
    <input type="text" id="vipHeader" placeholder="例如：本月 VIP 獨享回饋">
  </div>
  <div class="form-group">
    <label>活動詳情內容 (HTML)</label>
    <textarea id="vipBody" rows="3" placeholder="可以使用 <br> 換行"></textarea>
  </div>

  <div class="section-title">🖼️ 首頁輪播圖更新 (10張)</div>
  <div id="imageInputs"></div>

  <button class="btn-save" onclick="saveData()">儲存所有更新</button>
  <div id="statusMsg"></div>
</div>

<script>
  let globalPassword = "";
  const defaultImages = [
    "https://i.ibb.co/N62sSHDc/OA-VISION-5-0.jpg", "https://i.ibb.co/CKz4pPFj/OA-VISION-2-0.jpg",
    "https://i.ibb.co/TDJGQj0R/OA-VISION-3-0.jpg", "https://i.ibb.co/9HG2DCtt/OA-VISION-4-0.jpg",
    "https://i.ibb.co/sJWVt0t3/2025-04-21-012828-226-0.jpg", "https://i.ibb.co/8g9bB7kF/OA-VISION-6-0.jpg",
    "https://i.ibb.co/vx0sC1dr/OA-VISION-7-0.jpg", "https://i.ibb.co/KkHLv9J/OA-VISION-8-0.jpg",
    "https://i.ibb.co/ZR4VX8PH/OA-VISION-10-0.jpg", "https://i.ibb.co/Rk3zD6HM/OA-VISION-9-0.jpg"
  ];

  window.onload = function() {
    let imgHtml = "";
    for(let i=0; i<10; i++) {
      imgHtml += `<div class="form-group"><label>輪播圖 ${i+1}</label><input type="text" id="imgInput${i}"></div>`;
    }
    document.getElementById('imageInputs').innerHTML = imgHtml;
  };

  function checkLogin() {
    const pass = document.getElementById('adminPass').value;
    fetch('/api/cms', {
      method: 'POST',
      body: JSON.stringify({ action: "getConfig", adminPassword: pass })
    }).then(r => r.json()).then(res => {
      if(res.status === "success") {
        globalPassword = pass;
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('admin-content').style.display = 'block';
        loadConfig(res.data);
        fetchReport(); // 登入成功後自動抓取報表
      } else {
        document.getElementById('login-msg').innerText = "❌ 密碼錯誤";
      }
    });
  }

  function loadConfig(d) {
    document.getElementById('topText').value = d.topText || "";
    document.getElementById('topLink').value = d.topLink || "";
    document.getElementById('vipHeader').value = d.vipPromoHeader || "";
    document.getElementById('vipBody').value = d.vipPromoBody || "";
    if(d.carouselImages) {
        let imgs = JSON.parse(d.carouselImages);
        for(let i=0; i<10; i++) { if(imgs[i]) document.getElementById('imgInput'+i).value = imgs[i]; }
    }
  }

  function fetchReport() {
    fetch('/api/cms', {
      method: 'POST',
      body: JSON.stringify({ action: "getReportData", adminPassword: globalPassword })
    }).then(r => r.json()).then(res => {
      if(res.status === "success") {
        document.getElementById('yearTotalDisplay').innerText = "🏆 全年度總淨利：" + res.yearTotal;
        let table = document.getElementById('reportTable');
        let html = "";
        res.reportRows.forEach((row, index) => {
            let tag = index === 0 ? "th" : "td";
            html += `<tr>
                <${tag}>${row[0]}</${tag}> <${tag}>${row[2]}</${tag}> <${tag}>${row[3]}</${tag}> <${tag}>${row[4]}</${tag}> <${tag}>${row[6]}</${tag}> <${tag}>${row[7]}</${tag}> </tr>`;
        });
        table.innerHTML = html;
      }
    });
  }

  function saveData() {
    let imgArray = [];
    for(let i=0; i<10; i++) { imgArray.push(document.getElementById('imgInput'+i).value.trim() || defaultImages[i]); }
    let payload = {
      action: "saveConfig",
      adminPassword: globalPassword,
      topText: document.getElementById('topText').value,
      topLink: document.getElementById('topLink').value,
      vipPromoHeader: document.getElementById('vipHeader').value,
      vipPromoBody: document.getElementById('vipBody').value,
      carouselImages: JSON.stringify(imgArray)
    };
    document.getElementById('statusMsg').innerText = "儲存更新中...";
    fetch('/api/cms', {
      method: 'POST',
      body: JSON.stringify(payload)
    }).then(r => r.json()).then(res => {
      if(res.status === "success") {
        document.getElementById('statusMsg').innerText = "✅ 儲存成功！已即時同步到官網";
        document.getElementById('statusMsg').style.color = "green";
      }
    });
  }
</script>
</body>
</html>
